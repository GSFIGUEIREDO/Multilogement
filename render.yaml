services:
  - type: web
    name: climaparc-hvac
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    healthCheckPath: /api/health
    envVars:
      - key: CLIMAPARC_SERVER_MODE
        value: fastapi
      - key: CLIMAPARC_HOST
        value: 0.0.0.0
      - key: CLIMAPARC_SESSION_TTL
        value: "28800"
      - key: DATABASE_URL
        sync: false
      - key: APP_BASE_URL
        value: https://multilogement.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
